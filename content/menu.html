<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="stylesheet" href="/styles/normalize.css" />
    <link rel="stylesheet" href="/styles/globals.css" />
    <link rel="stylesheet" href="/styles/button.css" />
    <link rel="stylesheet" href="/styles/header.css" /> 
    <link rel="stylesheet" href="/styles/menu/top-bar.css" />
     <link rel="stylesheet" href="/styles/home/products.css" />
    <link rel="stylesheet" href="/styles/home/footer.css" /> 
    <title>Menu | Tizi Caffé</title>
  </head>
  <body>
    <main>
      <header>
        <div class="container">
          <!--Mark-->
          <nav class="mark">
            <span class="logo">Tizi Caffé</span>
            <span class="description">Café de spécialité</span>
          </nav>
          <!--Navigation page-->
          <nav class="nav-page">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/content/menu.html" class="nav-link active">Menu</a>
            <a href="/content/story.html" class="nav-link">Notre histoire</a>
          </nav>
          <!--Action-->
          <nav class="action">
            <!--Cart-->
           <a href="./cart.html" class="cart-btn btn btn-ghost">
    Panier 🛒
    <span class="cart-badge">0</span>
</a>
            <!-- Auth -->
            <button class="btn btn-ghost">Se connecter</button>
            <button class="btn btn-accent">Inscription</button>
          </nav>
        </div>
      </header>

      <section class="top-bar">
        <div class="container">
          <div class="tag">Notre Menu</div>
          <h1 class="title">Découvrez <em> Chaque Gorgée </em></h1>
          <p class="subtitle">De l'espresso classique aux origines exotiques.</p>
        </div>
    </section>

  <section id="products">
        <div class="container">
          
          <div class="menu-controls">
            <div class="search-wrapper">
              <span class="search-icon">🔍</span>
              <input 
                type="text" 
                id="search-input" 
                placeholder="Rechercher un café, une boisson, un accessoire..." 
                aria-label="Rechercher un produit"
              />
            </div>

            <nav class="filter-menu">
              <button class="filter-btn active" data-category="all">Tout le Menu</button>
              <button class="filter-btn" data-category="hot-drinks">Boissons Chaudes</button>
              <button class="filter-btn" data-category="cold-drinks">Boissons Froides</button>
              <button class="filter-btn" data-category="beans">Café en Grains</button>
              <button class="filter-btn" data-category="desserts">
    Desserts 
</button>
          </div>

          <div id="products-grid" class="products-grid">
            </div>
          
        </div>
      </section>



    </main>
    <script type="module" src="/javascript/products/all.js"></script>
    
  </body>
</html>
