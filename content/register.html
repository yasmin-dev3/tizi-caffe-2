<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription | Tizi Caffé</title>

<link rel="stylesheet" href="../styles/normalize.css">
<link rel="stylesheet" href="../styles/globals.css">
<link rel="stylesheet" href="../styles/button.css">
<link rel="stylesheet" href="../styles/header.css">

<style>

body{
    background:#f8f5f2;
    font-family:Arial,Helvetica,sans-serif;
}

.register-container{
    width:450px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.register-container h1{
    text-align:center;
    color:#5b3924;
    margin-bottom:30px;
}

.register-container input{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.register-container button{
    width:100%;
    padding:15px;
    background:#6d4c41;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.register-container button:hover{
    background:#4e342e;
}

.register-container p{
    text-align:center;
    margin-top:20px;
}

.register-container a{
    color:#6d4c41;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav class="mark">
<span class="logo">Tizi Caffé</span>
<span class="description">Café de spécialité</span>
</nav>

<nav class="nav-page">
<a href="../index.html" class="nav-link">Accueil</a>
<a href="menu.html" class="nav-link active">Menu</a>
<a href="story.html" class="nav-link">Notre histoire</a>
</nav>

</div>

</header>

<div class="register-container">

<h1>Créer un compte</h1>

<form>

<input type="text" placeholder="Nom complet" required>

<input type="email" placeholder="Adresse e-mail" required>

<input type="tel" placeholder="Téléphone" required>

<input type="password" placeholder="Mot de passe" required>

<input type="password" placeholder="Confirmer le mot de passe" required>

<button type="submit">
S'inscrire
</button>

</form>

<p>

Vous avez déjà un compte ?

<a href="content/login.html">

Se connecter

</a>

</p>

</div>

</body>
</html>
